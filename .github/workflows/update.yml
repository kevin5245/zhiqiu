name: Update Live

on:
  workflow_dispatch:

  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Xray
        run: |
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip Xray-linux-64.zip
          chmod +x xray

      - name: Start Proxy
        run: |
          nohup ./xray run -config v2ray.json > xray.log 2>&1 &

      - name: Install Dependencies
        run: npm install

      - name: Run Script
        run: node main.js

      - name: Commit Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add live.m3u live.txt

          git commit -m "update live" || echo "no changes"

          git push
